<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Droege GANTT Generator v20.0</title>
  <link rel="stylesheet" href="taskpane.css">
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-text">
        <span class="logo-title">GANTT Generator</span>
        <span class="logo-sub">DROEGE GROUP</span>
      </div>
    </div>
    <div class="info-bar">
      <span id="infoVersion">v20.0</span>
      <span id="infoDateTime">--</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- RASTEREINHEIT -->
    <div class="card">
      <h2>Rastereinheit (RE)</h2>
      <div class="re-row">
        <input type="number" id="gridUnit" value="0.21" step="0.01" min="0.01">
        <span class="unit">cm</span>
      </div>
      <div class="presets">
        <button class="pre active" data-value="0.21">0,21</button>
        <button class="pre" data-value="0.42">0,42</button>
        <button class="pre" data-value="0.63">0,63</button>
        <button class="pre" data-value="2.10">2,10</button>
      </div>
    </div>

    <!-- GANTT-DIAGRAMM -->
    <div class="card">
      <h2>GANTT-Diagramm</h2>
      <p class="hint">Position: Links=9 RE, Oben=17 RE | Max.Breite=118 RE</p>

      <!-- Zeitraum -->
      <div class="form-row">
        <label>Projektzeitraum</label>
        <div class="date-row">
          <input type="date" id="ganttStart">
          <span>–</span>
          <input type="date" id="ganttEnd">
        </div>
      </div>

      <!-- Zeiteinheit -->
      <div class="form-row">
        <label>Zeiteinheit</label>
        <select id="ganttUnit">
          <option value="day">Tage</option>
          <option value="week" selected>Kalenderwochen</option>
          <option value="month">Monate</option>
          <option value="quarter">Quartale</option>
        </select>
      </div>

      <!-- Spaltenbreiten-Modus -->
      <div class="form-row">
        <label>Spaltenbreiten-Modus</label>
        <select id="ganttWidthMode">
          <option value="fixed">Feste Breite (in RE)</option>
          <option value="auto" selected>Auto-Verteilung (ganze RE, max. 118)</option>
        </select>
      </div>

      <!-- Layout-Parameter -->
      <div class="form-row inline">
        <div>
          <label>Label-Breite (RE)</label>
          <input type="number" id="ganttLabelW" value="20" min="5" max="40">
        </div>
        <div id="colWidthDiv" style="display:none">
          <label>Spaltenbreite (RE)</label>
          <input type="number" id="ganttColW" value="3" min="1" max="20">
        </div>
      </div>

      <div class="form-row inline">
        <div>
          <label>Kopfzeile (RE)</label>
          <input type="number" id="ganttHeaderH" value="3" min="2" max="10">
        </div>
        <div>
          <label>Zeilenhöhe (RE)</label>
          <input type="number" id="ganttRowH" value="5" min="3" max="15">
        </div>
      </div>

      <div class="form-row">
        <label>Balkenhöhe (RE)</label>
        <input type="number" id="ganttBarH" value="3" min="1" max="10">
      </div>

      <!-- Heute-Linie Checkbox -->
      <div class="checkbox-row">
        <label class="checkbox-label">
          <input type="checkbox" id="ganttTodayLine" checked>
          <span class="checkmark"></span>
          <span class="checkbox-text">"Heute"-Linie anzeigen <span class="today-indicator">(rot)</span></span>
        </label>
      </div>

      <!-- Phasen -->
      <div class="phases-header">
        <label>Phasen</label>
        <button class="btn small accent" id="ganttAddPhase">+ Phase</button>
      </div>
      <div class="gantt-phases" id="ganttPhases"></div>

      <!-- Info -->
      <div class="gantt-info" id="ganttInfo"></div>

      <!-- Erstellen -->
      <button class="btn full primary" id="createGantt">GANTT erstellen</button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="sts success" id="status">Bereit</div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
