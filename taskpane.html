<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Droege GANTT Generator</title>
  <link rel="stylesheet" href="taskpane.css">
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">
      <svg viewBox="0 0 40 40" width="32" height="32">
        <rect x="2" y="2" width="36" height="36" rx="4" fill="#1a1a2e"/>
        <rect x="6" y="10" width="20" height="4" rx="1" fill="#e94560"/>
        <rect x="10" y="18" width="24" height="4" rx="1" fill="#0f3460"/>
        <rect x="8" y="26" width="18" height="4" rx="1" fill="#16213e"/>
      </svg>
      <div class="logo-text">
        <span class="logo-title">GANTT Generator</span>
        <span class="logo-sub">DROEGE GROUP</span>
      </div>
    </div>
    <div class="info-bar">
      <span id="infoDateTime">--</span>
      <span id="infoVersion">v21.0</span>
      <span id="infoApi">API 1.10</span>
    </div>
  </header>

  <main class="main">
    <!-- Rastereinheit -->
    <section class="card">
      <h2>Rastereinheit (RE)</h2>
      <div class="re-row">
        <input type="number" id="gridUnit" value="0.2117" min="0.05" max="5" step="0.0001">
        <span class="unit">cm</span>
      </div>
      <div class="presets">
        <button class="pre active" data-value="0.2117">0,2117</button>
        <button class="pre" data-value="0.4233">0,4233</button>
        <button class="pre" data-value="0.6350">0,6350</button>
        <button class="pre" data-value="2.1167">2,1167</button>
      </div>
    </section>

    <!-- Bildschirmformat (NEU in v21) -->
    <section class="card">
      <h2>Bildschirmformat</h2>
      <div class="format-info">
        <span id="detectedFormat" class="format-label">Wird erkannt...</span>
        <button id="detectFormat" class="btn-small">🔎 Erkennen</button>
      </div>
      <div class="offset-info">
        <span id="gridOffsetInfo" class="hint">Offset X: – cm, Y: – cm</span>
      </div>
    </section>

    <!-- Zeitraum -->
    <section class="card">
      <h2>Zeitraum</h2>
      <div class="date-row">
        <div class="date-field">
          <label>Start</label>
          <input type="date" id="ganttStart">
        </div>
        <div class="date-field">
          <label>Ende</label>
          <input type="date" id="ganttEnd">
        </div>
      </div>
      <div class="unit-row">
        <label>Einheit</label>
        <select id="ganttUnit">
          <option value="day">Tage</option>
          <option value="week" selected>Wochen</option>
          <option value="month">Monate</option>
          <option value="quarter">Quartale</option>
        </select>
      </div>
    </section>

    <!-- Layout-Parameter -->
    <section class="card">
      <h2>Layout (in RE)</h2>
      <div class="param-grid">
        <label>Label-Breite</label>
        <input type="number" id="ganttLabelW" value="20" min="5" max="50">
        <label>Header-Höhe</label>
        <input type="number" id="ganttHeaderH" value="3" min="1" max="10">
        <label>Zeilen-Höhe</label>
        <input type="number" id="ganttRowH" value="5" min="2" max="20">
        <label>Balken-Höhe</label>
        <input type="number" id="ganttBarH" value="3" min="1" max="15">
      </div>
      <div class="width-mode-row">
        <label>Spaltenbreite</label>
        <select id="ganttWidthMode">
          <option value="auto">Auto-Verteilung</option>
          <option value="fixed">Feste Breite</option>
        </select>
      </div>
      <div id="colWidthDiv" style="display:none">
        <label>Spalte (RE)</label>
        <input type="number" id="ganttColW" value="3" min="1" max="20">
      </div>
    </section>

    <!-- Phasen -->
    <section class="card">
      <h2>Phasen</h2>
      <div id="ganttPhases"></div>
      <button id="ganttAddPhase" class="btn-add">+ Phase</button>
    </section>

    <!-- Optionen -->
    <section class="card">
      <h2>Optionen</h2>
      <label class="check-row">
        <input type="checkbox" id="ganttTodayLine" checked>
        Heute-Linie anzeigen
      </label>
    </section>

    <!-- Erstellen -->
    <section class="card">
      <button id="createGantt" class="btn-primary">GANTT erstellen</button>
      <div id="status" class="status">Bereit</div>
    </section>
  </main>

  <script src="taskpane.js"></script>
</body>
</html>
